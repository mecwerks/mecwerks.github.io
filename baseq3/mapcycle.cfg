// Map cycle

set ffa_gt "gametype 0; fraglimit 40; timelimit 20"
set tourn_gt "gametype 1; fraglimit 10"
// gametype 2: single player
set tdm_gt "gametype 3; fraglimit 100; timelimit 20"
set ctf_gt "gametype 4; capturelimit 4; timelimit 30"

set m1 "ffa_gt; map q3dm7; set nextmap vstr m2
set m2 "tdm_gt; map q3dm13; set nextmap vstr m3"
set m3 "ffa_gt; map q3tourney2; set nextmap vstr m4"
set m4 "tdm_gt; map q3dm18; set nextmap vstr m1"

vstr m1
